<!-- FOOD SECTION -->
<div class="container mt-4">
  <h2 class="text-center mb-4">Buy Your Favorite Food</h2>

  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">

    <div class="col" *ngFor="let food of foods">
      <div class="card h-100 shadow-sm">

        <img 
        [src]="'http://localhost:8080/admin/image/' + food.image"
        class="food-img"
        alt="{{food.name}}">

        <div class="card-body d-flex flex-column">
          <h5 class="card-title">{{ food.name }}</h5>

          <p class="card-text">
            {{ food.description }}
          </p>

          <h6 class="text-primary">$ {{ food.price }}</h6>

          <div class="mt-auto d-flex gap-2">

            <button class="btn btn-success flex-fill"
            (click)="addToCart(food)"> 
            Buy Now
            </button>

            <button class="btn btn-warning flex-fill"
            (click)="addToCart(food)">
            Add to Cart
            </button>

          </div>

        </div>
      </div>
    </div>

  </div>
</div>
