<div class="container mt-5">

  <div class="row">

    <!-- LEFT SIDE: PROFILE CARD -->
    <div class="col-md-4">
      <div class="card shadow-lg text-center p-4">

        <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
             class="rounded-circle mx-auto mb-3"
             width="120">

        <h4>{{profile.name || 'Your Name'}}</h4>
        <p class="text-muted">{{profile.email || 'your@email.com'}}</p>

        <hr>

        <p><b>📞</b> {{profile.phone || 'Not Added'}}</p>
        <p><b>📍</b> {{profile.address || 'Not Added'}}</p>

      </div>
    </div>


    <!-- RIGHT SIDE: EDIT FORM -->
    <div class="col-md-8">
      <div class="card shadow-lg p-4">

        <h3 class="mb-4 text-primary">Edit Profile</h3>

        <div class="row">

          <div class="col-md-6 mb-3">
            <label>Name</label>
            <input type="text" class="form-control" #name placeholder="Enter name">
          </div>

          <div class="col-md-6 mb-3">
            <label>Email</label>
            <input type="email" class="form-control" #email placeholder="Enter email">
          </div>

          <div class="col-md-6 mb-3">
            <label>Phone</label>
            <input type="text" class="form-control" #phone placeholder="Enter phone">
          </div>

          <div class="col-md-6 mb-3">
            <label>Address</label>
            <input type="text" class="form-control" #address placeholder="Enter address">
          </div>

        </div>

        <button class="btn btn-primary w-100 mt-3"
        (click)="updateProfile(name.value,email.value,phone.value,address.value)">
          💾 Save Changes
        </button>
           <hr>

<p><b>📞</b> {{profile.phone || 'Not Added'}}</p>
<p><b>📍</b> {{profile.address || 'Not Added'}}</p>

<button
  class="btn btn-danger w-100 mt-2"
  (click)="logout()">
  🚪 Logout
</button>
      </div>
    </div>

  </div>

</div>
