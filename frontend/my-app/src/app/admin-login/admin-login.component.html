<div class="login-container">
  <div class="login-box">
    <h2>Admin Login</h2>

    <form (ngSubmit)="login()">
      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          class="form-control"
          [(ngModel)]="email"
          name="email"
          required
        />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          class="form-control"
          [(ngModel)]="password"
          name="password"
          required
        />
      </div>

       
      <button type="submit" class="btn btn-success w-100">
        Login
      </button>
      
    </form>

    <p class="text-danger mt-3">{{message}}</p>
  </div>
</div>
