<div class="container mt-5">

  <h2 class="text-center mb-4">🛒 Your Cart</h2>

  <!-- If Cart Empty -->
  <div *ngIf="cartItems.length === 0" class="text-center">
    <h5>Your cart is empty 😔</h5>
  </div>

  <!-- Cart Items -->
  <div *ngIf="cartItems.length > 0">

    <div class="card mb-3 shadow-sm" *ngFor="let item of cartItems">

      <div class="row g-0 align-items-center">

       <img 
  *ngIf="item.food?.image"
  [src]="imageBaseUrl + item.food.image" 
  class="img-fluid rounded-start">
        <!-- Details -->
        <div class="col-md-6">
          <div class="card-body">
            <h5 class="card-title">{{ item.name }}</h5>
            <p class="card-text">
              Price: <strong>$ {{ item.price }}</strong>
            </p>
            <p class="card-text">
              Quantity: <strong>{{ item.quantity }}</strong>
            </p>
          </div>
        </div>

        <!-- Remove Button -->
        <div class="col-md-3 text-center">
          <button 
            class="btn btn-danger"
            (click)="removeItem(item.id)">
            Remove
          </button>
        </div>

      </div>

    </div>

    <!-- Total Section -->
    <div class="card shadow p-3 mt-4">
      <div class="d-flex justify-content-between align-items-center">
        <h4>Total Amount:</h4>
        <h4 class="text-success">$ {{ totalAmount }}</h4>
      </div>
       <button class="btn btn-primary w-100 mt-3" (click)="checkout()">
  Proceed to Checkout
</button>
    </div>

  </div>

</div>
